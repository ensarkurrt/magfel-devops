http:
  routers:
    # === VPN-ONLY ROUTES ===

    # Traefik Dashboard
    traefik-dashboard:
      rule: "Host(`traefik.example.com`)"
      service: "api@internal"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # Portainer
    portainer:
      rule: "Host(`portainer.example.com`)"
      service: portainer-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # Grafana
    grafana:
      rule: "Host(`grafana.example.com`)"
      service: grafana-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # Prometheus
    prometheus:
      rule: "Host(`prometheus.example.com`)"
      service: prometheus-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # MinIO Console
    minio-console:
      rule: "Host(`minio.example.com`)"
      service: minio-console-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # MinIO API
    minio-api:
      rule: "Host(`s3.example.com`)"
      service: minio-api-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist

    # Docker Registry
    registry:
      rule: "Host(`registry.example.com`)"
      service: registry-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist

    # GOWA — WhatsApp Gateway API
    gowa:
      rule: "Host(`gowa.example.com`)"
      service: gowa-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # Twenty CRM
    twenty:
      rule: "Host(`twenty.example.com`)"
      service: twenty-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # Jenkins CI
    jenkins:
      rule: "Host(`jenkins.example.com`)"
      service: jenkins-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # OpenStatus Dashboard
    openstatus-dash:
      rule: "Host(`status-admin.example.com`)"
      service: openstatus-dash-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - vpn-whitelist
        - secure-headers

    # === PUBLIC ROUTES ===

    # Umami Analytics (public — tracking script must be accessible)
    umami:
      rule: "Host(`umami.example.com`)"
      service: umami-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers

    # OpenStatus Public Page
    openstatus-page:
      rule: "Host(`status.example.com`)"
      service: openstatus-page-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers

  services:
    portainer-svc:
      loadBalancer:
        servers:
          - url: "http://infra-portainer_portainer:9000"

    grafana-svc:
      loadBalancer:
        servers:
          - url: "http://mon-grafana_grafana:3000"

    prometheus-svc:
      loadBalancer:
        servers:
          - url: "http://mon-prometheus_prometheus:9090"

    minio-console-svc:
      loadBalancer:
        servers:
          - url: "http://data-minio_minio:9001"

    minio-api-svc:
      loadBalancer:
        servers:
          - url: "http://data-minio_minio:9000"

    registry-svc:
      loadBalancer:
        servers:
          - url: "http://infra-registry_registry:5000"

    gowa-svc:
      loadBalancer:
        servers:
          - url: "http://app-gowa_gowa:3000"

    umami-svc:
      loadBalancer:
        servers:
          - url: "http://tool-umami_umami:3000"

    twenty-svc:
      loadBalancer:
        servers:
          - url: "http://tool-twenty_twenty:3000"

    jenkins-svc:
      loadBalancer:
        servers:
          - url: "http://ci-jenkins_jenkins:8080"

    openstatus-dash-svc:
      loadBalancer:
        servers:
          - url: "http://tool-openstatus_web:3000"

    openstatus-page-svc:
      loadBalancer:
        servers:
          - url: "http://tool-openstatus_web:3000"
