version: "3.8"

services:
  twenty:
    image: twentycrm/twenty:latest
    environment:
      PG_DATABASE_URL: "postgresql://twenty:${TWENTY_DB_PASSWORD}@data-postgresql_postgresql:5432/twenty"
      REDIS_URL: "redis://data-redis_redis:6379/3"
      SERVER_URL: "https://${TWENTY_DOMAIN:-twenty.example.com}"
      FRONT_BASE_URL: "https://${TWENTY_DOMAIN:-twenty.example.com}"
      APP_SECRET: "${TWENTY_APP_SECRET}"
      STORAGE_TYPE: "local"
      STORAGE_LOCAL_PATH: "/app/.local-storage"
    ports:
      - "3030:3000"
    volumes:
      - /opt/data/twenty:/app/.local-storage
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

networks:
  backend:
    external: true
