version: "3.8"

services:
  web:
    image: openstatus/app:latest
    environment:
      DATABASE_URL: "file:/data/openstatus.db"
      NEXT_PUBLIC_URL: "https://${OPENSTATUS_DASH_DOMAIN:-status-admin.example.com}"
    ports:
      - "3003:3000"
    volumes:
      - /opt/data/openstatus:/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  server:
    image: openstatus/server:latest
    environment:
      DATABASE_URL: "file:/data/openstatus.db"
    volumes:
      - /opt/data/openstatus:/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  checker:
    image: openstatus/checker:latest
    environment:
      DATABASE_URL: "file:/data/openstatus.db"
    volumes:
      - /opt/data/openstatus:/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  backend:
    external: true
