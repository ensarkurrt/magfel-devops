version: "3.8"

services:
  web:
    image: makeplane/plane-frontend:stable
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  space:
    image: makeplane/plane-space:stable
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  api:
    image: makeplane/plane-backend:stable
    environment:
      DATABASE_URL: "postgresql://plane:${PLANE_DB_PASSWORD}@data-postgresql_postgresql:5432/plane"
      REDIS_URL: "redis://data-redis_redis:6379/1"
      SECRET_KEY: "${PLANE_SECRET_KEY}"
      CORS_ALLOWED_ORIGINS: ""
    command: ["./bin/start.sh", "api"]
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  worker:
    image: makeplane/plane-backend:stable
    environment:
      DATABASE_URL: "postgresql://plane:${PLANE_DB_PASSWORD}@data-postgresql_postgresql:5432/plane"
      REDIS_URL: "redis://data-redis_redis:6379/1"
      SECRET_KEY: "${PLANE_SECRET_KEY}"
    command: ["./bin/start.sh", "worker"]
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  beat-worker:
    image: makeplane/plane-backend:stable
    environment:
      DATABASE_URL: "postgresql://plane:${PLANE_DB_PASSWORD}@data-postgresql_postgresql:5432/plane"
      REDIS_URL: "redis://data-redis_redis:6379/1"
      SECRET_KEY: "${PLANE_SECRET_KEY}"
    command: ["./bin/start.sh", "beat"]
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  backend:
    external: true
