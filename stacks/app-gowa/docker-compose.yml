version: "3.8"

services:
  gowa:
    image: aldinokemal2104/go-whatsapp-web-multidevice:latest
    command:
      - rest
      - --port=3000
    ports:
      - "3010:3000"
    volumes:
      - /opt/data/gowa:/app/storages
    networks:
      - swarm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.app == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  swarm_network:
    external: true
