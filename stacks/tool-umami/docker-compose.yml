version: "3.8"

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: "postgresql://umami:${UMAMI_DB_PASSWORD}@data-postgresql_postgresql:5432/umami"
      APP_SECRET: "${UMAMI_APP_SECRET}"
    ports:
      - "3020:3000"
    networks:
      - swarm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  swarm_network:
    external: true
