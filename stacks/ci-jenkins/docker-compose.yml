version: "3.8"

services:
  jenkins:
    image: jenkins/jenkins:lts
    environment:
      JAVA_OPTS: "-Xmx1g -Xms512m"
      JENKINS_OPTS: "--prefix=/"
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - /opt/data/jenkins:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.ci == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  backend:
    external: true
