version: "3.8"

services:
  openpanel:
    image: openpanel/openpanel:latest
    environment:
      DATABASE_URL: "postgresql://openpanel:${OPENPANEL_DB_PASSWORD}@data-postgresql_postgresql:5432/openpanel"
      REDIS_URL: "redis://data-redis_redis:6379/2"
      SECRET: "${OPENPANEL_SECRET}"
      NEXT_PUBLIC_DASHBOARD_URL: "https://${OPENPANEL_DOMAIN:-openpanel.example.com}"
    ports:
      - "3002:3000"
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  backend:
    external: true
