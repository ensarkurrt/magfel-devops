# SwarmForge Redis Configuration
# Optimized for reliability with volatile-lru eviction

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory
maxmemory 512mb
# volatile-lru: Only evict keys with TTL set.
# This preserves OTP tokens and other critical TTL-based data.
maxmemory-policy volatile-lru
maxmemory-samples 10

# Persistence - AOF
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# Persistence - RDB snapshots
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Logging
loglevel notice

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client limits
maxclients 10000

# Latency monitoring
latency-monitor-threshold 100
