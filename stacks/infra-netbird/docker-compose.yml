version: "3.8"

services:
  dashboard:
    image: netbirdio/dashboard:latest
    environment:
      NETBIRD_MGMT_API_ENDPOINT: "https://${NETBIRD_DOMAIN}:443"
      NETBIRD_MGMT_GRPC_API_ENDPOINT: "https://${NETBIRD_DOMAIN}:443"
      AUTH_SUPPORTED_SCOPES: "openid profile email"
      NETBIRD_TOKEN_SOURCE: "idToken"
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  management:
    image: netbirdio/management:latest
    command:
      - "--port=443"
      - "--log-level=info"
      - "--single-account-mode-domain=${NETBIRD_DOMAIN}"
    volumes:
      - /opt/data/netbird/management:/var/lib/netbird
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  signal:
    image: netbirdio/signal:latest
    ports:
      - "10000:80"
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  coturn:
    image: coturn/coturn:latest
    command:
      - "--listening-port=3478"
      - "--min-port=49152"
      - "--max-port=65535"
      - "--fingerprint"
      - "--lt-cred-mech"
      - "--no-software-attribute"
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  backend:
    external: true
