version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.54.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - /opt/configs/prometheus:/etc/prometheus:ro
      - /opt/data/prometheus:/prometheus
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    networks:
      - backend
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - backend
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://admin:${PG_PASSWORD}@data-postgresql_postgresql:5432/main?sslmode=disable"
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    environment:
      REDIS_ADDR: "redis://data-redis_redis:6379"
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tools == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  backend:
    external: true
