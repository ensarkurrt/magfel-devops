global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "mon-alertmanager_alertmanager:9093"

rule_files:
  - "/etc/prometheus/alert-rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    dns_sd_configs:
      - names:
          - "tasks.mon-prometheus_node-exporter"
        type: A
        port: 9100

  - job_name: "cadvisor"
    dns_sd_configs:
      - names:
          - "tasks.mon-prometheus_cadvisor"
        type: A
        port: 8080

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["mon-prometheus_postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["mon-prometheus_redis-exporter:9121"]

  - job_name: "minio"
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["data-minio_minio:9000"]

  - job_name: "traefik"
    static_configs:
      - targets: ["infra-traefik_traefik:8082"]

  - job_name: "loki"
    static_configs:
      - targets: ["log-loki_loki:3100"]
