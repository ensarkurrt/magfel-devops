groups:
  # === NODE ALERTS ===
  - name: node
    rules:
      - alert: NodeHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% (current: {{ $value }}%)"

      - alert: NodeHighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% (current: {{ $value }}%)"

      - alert: NodeCriticalMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 95% (current: {{ $value }}%)"

      - alert: NodeHighDisk
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk usage is above 80% (current: {{ $value }}%)"

      - alert: NodeCriticalDisk
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 92
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL disk usage on {{ $labels.instance }}"
          description: "Disk usage is above 92% (current: {{ $value }}%)"

      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"

  # === POSTGRESQL ALERTS ===
  - name: postgresql
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"

      - alert: PostgreSQLHighConnections
        expr: sum(pg_stat_activity_count) / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections above 80%"
          description: "{{ $value }}% of max connections in use"

      - alert: PostgreSQLDeadlocks
        expr: increase(pg_stat_database_deadlocks[5m]) > 0
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL deadlock detected"

      - alert: PostgreSQLLongTransaction
        expr: pg_stat_activity_max_tx_duration{state="active"} > 300
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Long-running transaction (>5min)"

      - alert: PostgreSQLLowCacheHit
        expr: pg_stat_database_blks_hit / (pg_stat_database_blks_hit + pg_stat_database_blks_read) * 100 < 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL cache hit ratio below 90%"

  # === REDIS ALERTS ===
  - name: redis
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down — OTP and session data affected"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 85%"

      - alert: RedisEvictionStarted
        expr: increase(redis_evicted_keys_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis eviction started"
          description: "volatile-lru is evicting TTL keys. Check if maxmemory needs increase."

      - alert: RedisHighEviction
        expr: rate(redis_evicted_keys_total[5m]) > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Redis high eviction rate"
          description: "Over 100 keys/sec being evicted. Memory pressure is severe."

      - alert: RedisHighClients
        expr: redis_connected_clients > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis has {{ $value }} connected clients"

  # === MINIO ALERTS ===
  - name: minio
    rules:
      - alert: MinIODown
        expr: minio_cluster_health_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MinIO is down"

      - alert: MinIOHighDisk
        expr: (1 - minio_cluster_disk_free_bytes / minio_cluster_disk_total_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MinIO disk usage above 80%"

      - alert: MinIOHighErrorRate
        expr: rate(minio_s3_requests_errors_total[5m]) / rate(minio_s3_requests_total[5m]) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MinIO error rate above 5%"

  # === CONTAINER ALERTS ===
  - name: containers
    rules:
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high CPU ({{ $value }}%)"

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high memory ({{ $value }}%)"

      - alert: ContainerRestarting
        expr: increase(container_restart_count[1h]) > 5
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restarting frequently"

  # === TRAEFIK ALERTS ===
  - name: traefik
    rules:
      - alert: TraefikHigh5xxRate
        expr: sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) / sum(rate(traefik_service_requests_total[5m])) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik 5xx error rate above 5%"

  # === LOKI ALERTS ===
  - name: loki
    rules:
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Loki is down — log ingestion stopped"
