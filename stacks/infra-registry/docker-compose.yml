version: "3.8"

services:
  registry:
    image: registry:2
    ports:
      - "5000:5000"
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "SwarmForge Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - /opt/data/registry:/var/lib/registry
      - /opt/configs/registry:/auth:ro
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.data == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      # /v2/ returns 401 when auth is enabled — grep for 200 or 401 to confirm server is up
      test: ["CMD-SHELL", "wget -S --spider http://localhost:5000/v2/ 2>&1 | grep -qE '(200|401)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  registry-ui:
    image: joxit/docker-registry-ui:2
    environment:
      REGISTRY_TITLE: "SwarmForge Registry"
      REGISTRY_URL: "http://registry:5000"
      DELETE_IMAGES: "true"
      SINGLE_REGISTRY: "true"
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.data == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  backend:
    external: true
