version: "3.8"

services:
  coredns:
    image: coredns/coredns:1.11.1
    command: ["-conf", "/etc/coredns/Corefile"]
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
    volumes:
      - /opt/configs/coredns:/etc/coredns:ro
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    # CoreDNS distroless image has no shell/wget/dig — healthcheck removed

networks:
  backend:
    external: true
