version: "3.8"

services:
  coredns:
    image: coredns/coredns:1.11
    command: ["-conf", "/etc/coredns/Corefile"]
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
    volumes:
      - /opt/configs/coredns:/etc/coredns:ro
    networks:
      - swarm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra == true
      restart_policy:
        condition: on-failure
        max_attempts: 10
        window: 60s
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "-p", "53", "dns.internal", "+short"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  swarm_network:
    external: true
