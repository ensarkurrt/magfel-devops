name: Preview Cleanup (DISABLED)

# Preview workflows are disabled — not used in this project.
# To re-enable, change the trigger back to:
#   pull_request:
#     types: [closed]
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  REGISTRY: registry:5000

jobs:
  cleanup-preview:
    name: Remove Preview
    runs-on: self-hosted
    steps:
      - name: Generate branch slug
        id: slug
        run: |
          BRANCH="${{ github.head_ref }}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Remove Swarm service
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          SERVICE_NAME="preview-${SLUG}"
          echo "Removing service: ${SERVICE_NAME}"
          docker service rm "${SERVICE_NAME}" 2>/dev/null || echo "Service already removed"

      - name: Remove Docker image
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          docker rmi "${{ env.REGISTRY }}/backend:${SLUG}" 2>/dev/null || true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.slug.outputs.slug }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview environment \`preview-${slug}\` has been removed.`,
            });
