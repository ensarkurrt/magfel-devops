name: Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: version
        run: echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

      - name: Build multi-platform binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-X github.com/ensarkurrt/swarmforge/cmd.Version=${VERSION} -X github.com/ensarkurrt/swarmforge/cmd.BuildTime=${BUILD_TIME}"

          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/swarmforge-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/swarmforge-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/swarmforge-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/swarmforge-darwin-arm64 .

      - name: Verify binary
        run: ./dist/swarmforge-linux-amd64 version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swarmforge-binaries
          path: dist/
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
