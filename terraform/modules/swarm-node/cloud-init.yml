#cloud-config
# ═══════════════════════════════════════════════════════════════════
# Phase 1: Open Setup — UFW KAPALI, tüm portlar erişilebilir
# Phase 2: Lockdown GitHub Action ile UFW + Hetzner FW aktif edilir
# ═══════════════════════════════════════════════════════════════════

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - jq
  - htop
  - ncdu
  - iotop

# ─── Config Files ────────────────────────────────────────────────────
write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      MaxAuthTries 3
      X11Forwarding no
      AllowTcpForwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2

  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      maxretry = 5
      bantime = 3600
      findtime = 600

  - path: /etc/sysctl.d/99-swarm-tuning.conf
    content: |
      net.core.somaxconn = 65535
      net.ipv4.tcp_max_syn_backlog = 65535
      net.ipv4.tcp_tw_reuse = 1
      net.ipv4.tcp_fin_timeout = 15
      net.ipv4.tcp_keepalive_time = 300
      net.ipv4.tcp_keepalive_intvl = 30
      net.ipv4.tcp_keepalive_probes = 5
      vm.swappiness = 10
      vm.overcommit_memory = 1
      fs.file-max = 2097152
      fs.inotify.max_user_watches = 524288

  - path: /etc/security/limits.d/99-swarm.conf
    content: |
      * soft nofile 65535
      * hard nofile 65535
      root soft nofile 65535
      root hard nofile 65535

  # UFW script — Phase 2'de çalıştırılacak (lockdown action)
  - path: /opt/scripts/enable-ufw.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp                 # SSH
      ufw allow 80/tcp                 # HTTP
      ufw allow 443/tcp                # HTTPS
      ufw allow 2377/tcp               # Swarm management
      ufw allow 7946/tcp               # Swarm node communication
      ufw allow 7946/udp               # Swarm node communication
      ufw allow 4789/udp               # Overlay network
      ufw allow from 10.0.0.0/24       # Private network
      ufw allow from 100.64.0.0/10     # NetBird VPN mesh
      ufw allow 51820/udp              # WireGuard (NetBird)
      ufw --force enable
      echo "UFW enabled."

runcmd:
  - sysctl --system

  # ─── Kernel modules for overlay networking ─────────────────────────
  - modprobe overlay
  - modprobe br_netfilter
  - |
    cat > /etc/modules-load.d/swarm.conf <<'MODULES'
    overlay
    br_netfilter
    MODULES
  - |
    cat >> /etc/sysctl.d/99-swarm-tuning.conf <<'BRIDGE'
    net.bridge.bridge-nf-call-iptables = 1
    net.bridge.bridge-nf-call-ip6tables = 1
    net.ipv4.ip_forward = 1
    BRIDGE
  - sysctl --system

  # ─── Docker ────────────────────────────────────────────────────────
  - curl -fsSL https://get.docker.com | sh
  - mkdir -p /etc/docker
  - |
    cat > /etc/docker/daemon.json <<'DAEMON'
    {
      "log-driver": "json-file",
      "log-opts": { "max-size": "10m", "max-file": "3" },
      "storage-driver": "overlay2",
      "live-restore": true,
      "default-address-pools": [{"base": "172.17.0.0/12", "size": 24}]
    }
    DAEMON
  - systemctl restart docker
  - systemctl enable docker

  # ─── Services (UFW KAPALI — Phase 2'de açılacak) ──────────────────
  - systemctl enable fail2ban
  - systemctl restart fail2ban
  - systemctl restart sshd

  # ─── Directories ──────────────────────────────────────────────────
  - mkdir -p /opt/stacks
  - mkdir -p /opt/backups
  - mkdir -p /opt/configs/coredns
  - mkdir -p /opt/scripts
